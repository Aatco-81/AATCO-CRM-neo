<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AATCO — جدول المواعيد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a4a8a;--primary-dark:#123570;--primary-light:#e8f0fb;--accent:#2563c7;--bg:#f0f4fa;--border:#dde4f0;--text:#1a2340;--text-muted:#6b7a9a;--won:#16a34a;--won-bg:#f0fdf4;--p1:#dc2626;--p1-bg:#fef2f2;--p2:#ea7c1a;--p2-bg:#fff7ed;--p3:#ca9e00;--p3-bg:#fefce8;--p4:#2563c7;--p4-bg:#eff6ff;--radius:10px;--shadow:0 2px 12px rgba(26,74,138,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}
.topbar{background:var(--primary);color:white;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tb-brand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700}
.tb-brand span{font-size:12px;opacity:.7;border-right:1px solid rgba(255,255,255,.3);padding-right:10px;margin-right:4px;font-weight:400}
.tb-nav{display:flex;gap:4px}
.nb{padding:6px 14px;border-radius:6px;font-size:13px;font-family:'Tajawal',sans-serif;font-weight:500;cursor:pointer;border:none;color:rgba(255,255,255,.8);background:transparent;transition:all .15s;text-decoration:none;display:inline-block}
.nb:hover,.nb.active{background:rgba(255,255,255,.15);color:white}
.tb-user{display:flex;align-items:center;gap:8px;font-size:13px}
.uav{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.btn-out{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif}
.page-body{padding:24px;max-width:1100px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:700;color:var(--primary)}
.btn-primary{background:var(--primary);color:white;border:none;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--primary-dark)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.fs{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:'Tajawal',sans-serif;outline:none;color:var(--text);background:white}
.fs:focus{border-color:var(--accent)}

/* Calendar grid */
.cal-header{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:var(--radius);border:1px solid var(--border);padding:14px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav button{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:500}
.cal-nav button:hover{background:var(--primary-light)}
.cal-month{font-size:16px;font-weight:700;color:var(--primary)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
.cal-day-label{text-align:center;font-size:12px;font-weight:700;color:var(--text-muted);padding:6px 0}
.cal-cell{background:white;border-radius:8px;border:1.5px solid var(--border);min-height:90px;padding:6px;cursor:pointer;transition:border-color .15s}
.cal-cell:hover{border-color:var(--accent)}
.cal-cell.today{border-color:var(--primary);background:var(--primary-light)}
.cal-cell.other-month{opacity:.4}
.cal-cell.has-appt{border-color:var(--p2)}
.cal-date{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:4px}
.cal-cell.today .cal-date{color:var(--primary)}
.appt-dot{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.appt-p1{background:var(--p1-bg);color:var(--p1)}
.appt-p2{background:var(--p2-bg);color:var(--p2)}
.appt-p3{background:var(--p3-bg);color:var(--p3)}
.appt-p4{background:var(--p4-bg);color:var(--p4)}

/* Upcoming list */
.section-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--primary-light)}
.appt-list{display:flex;flex-direction:column;gap:10px}
.appt-card{background:white;border-radius:var(--radius);border:1.5px solid var(--border);padding:14px 16px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow);transition:border-color .15s}
.appt-card:hover{border-color:var(--accent)}
.appt-date-box{min-width:56px;text-align:center;background:var(--primary-light);border-radius:8px;padding:8px 6px}
.appt-day{font-size:22px;font-weight:700;color:var(--primary);line-height:1}
.appt-month{font-size:11px;color:var(--text-muted);margin-top:2px}
.appt-info{flex:1}
.appt-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.appt-meta{font-size:12px;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap}
.appt-time{font-size:13px;font-weight:600;color:var(--primary)}
.appt-actions{display:flex;gap:6px;align-items:center}
.btn-sm{padding:5px 12px;border-radius:6px;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:all .15s}
.btn-sm:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.btn-sm.danger{border-color:#fca5a5;color:var(--p1)}
.btn-sm.danger:hover{background:var(--p1-bg)}
.pb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.pb-p1{background:var(--p1-bg);color:var(--p1);border:1px solid #fca5a5}
.pb-p2{background:var(--p2-bg);color:var(--p2);border:1px solid #fdba74}
.pb-p3{background:var(--p3-bg);color:var(--p3);border:1px solid #fde047}
.pb-p4{background:var(--p4-bg);color:var(--p4);border:1px solid #93c5fd}
.empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.overlay.show{display:flex}
.modal{background:white;border-radius:14px;width:460px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white}
.mt{font-size:16px;font-weight:700;color:var(--primary)}
.mc{font-size:22px;cursor:pointer;color:var(--text-muted)}
.mb{padding:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Tajawal',sans-serif;color:var(--text);background:white;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-save{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;margin-top:4px}
.btn-save:hover{background:var(--primary-dark)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overdue-badge{background:var(--p1-bg);color:var(--p1);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.today-badge{background:var(--primary-light);color:var(--primary);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
</style>
</head>
<body>

<div class="topbar" id="topbar"></div>

<div class="page-body">
  <div class="page-header">
    <div class="page-title">📅 جدول المواعيد</div>
    <button class="btn-primary" onclick="openAddModal()">+ إضافة موعد</button>
  </div>

  <div class="filters">
    <select class="fs" id="filter-rep" onchange="renderAll()">
      <option value="">كل المندوبين</option>
    </select>
    <select class="fs" id="filter-status" onchange="renderAll()">
      <option value="">كل المواعيد</option>
      <option value="upcoming">القادمة</option>
      <option value="today">اليوم</option>
      <option value="overdue">المتأخرة</option>
      <option value="done">المنتهية</option>
    </select>
  </div>

  <!-- Calendar -->
  <div class="cal-header">
    <button class="btn-primary" onclick="openAddModal()">+ موعد جديد</button>
    <div class="cal-nav">
      <button onclick="prevMonth()">→</button>
      <span class="cal-month" id="cal-month"></span>
      <button onclick="nextMonth()">←</button>
    </div>
    <button class="btn-primary" onclick="goToday()" style="background:var(--bg);color:var(--primary);border:1px solid var(--border)">اليوم</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>

  <!-- Upcoming appointments -->
  <div class="section-title">📋 المواعيد القادمة</div>
  <div class="appt-list" id="appt-list"></div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mh">
      <span class="mt" id="modal-title">إضافة موعد جديد</span>
      <span class="mc" onclick="closeModal()">×</span>
    </div>
    <div class="mb">
      <input type="hidden" id="edit-id">
      <div class="fg">
        <label>الفرصة / العميل *</label>
        <select id="f-card"></select>
      </div>
      <div class="fr">
        <div class="fg"><label>تاريخ الموعد *</label><input type="date" id="f-date"></div>
        <div class="fg"><label>الوقت</label><input type="time" id="f-time" value="09:00"></div>
      </div>
      <div class="fg">
        <label>نوع الموعد</label>
        <select id="f-type">
          <option>زيارة ميدانية</option>
          <option>اجتماع</option>
          <option>اتصال هاتفي</option>
          <option>تقديم عرض</option>
          <option>متابعة</option>
          <option>توقيع عقد</option>
        </select>
      </div>
      <div class="fg">
        <label>المندوب المسؤول</label>
        <select id="f-rep"></select>
      </div>
      <div class="fg">
        <label>ملاحظات</label>
        <textarea id="f-notes" rows="3" placeholder="تفاصيل الموعد..."></textarea>
      </div>
      <div class="fg">
        <label>الحالة</label>
        <select id="f-status">
          <option value="upcoming">قادم</option>
          <option value="done">منتهي</option>
          <option value="cancelled">ملغي</option>
        </select>
      </div>
      <button class="btn-save" onclick="saveAppt()">💾 حفظ الموعد</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
let session = null;
let appointments = JSON.parse(localStorage.getItem('aatco_appts') || '[]');
let calDate = new Date();
let editId = null;

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  session = requireAuth();
  if (!session) return;
  buildTopbar('schedule');
  populateReps();
  populateCardSelect();
  renderAll();
  renderCalendar();
  // Set today as default date
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
});

function populateReps() {
  const users = getUsers();
  const reps = Object.keys(users).filter(n => users[n].role !== 'مدير');
  ['filter-rep','f-rep'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    while (sel.options.length > (id === 'filter-rep' ? 1 : 0)) sel.remove(sel.options.length - 1);
    reps.forEach(r => {
      const o = document.createElement('option');
      o.value = r; o.textContent = r; sel.appendChild(o);
    });
  });
  // Lock rep if مندوب
  const repSel = document.getElementById('f-rep');
  if (session.role === 'مندوب') {
    repSel.value = session.user;
    repSel.disabled = true;
  }
  if (session.role === 'مندوب') {
    const fr = document.getElementById('filter-rep');
    fr.value = session.user; fr.disabled = true;
  }
}

function populateCardSelect() {
  const cards = getCards().filter(c => c.col !== 'lost' && c.col !== 'done');
  const sel = document.getElementById('f-card');
  sel.innerHTML = '<option value="">— اختر عميل —</option>';
  cards.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.name + ' | ' + c.service;
    sel.appendChild(o);
  });
}

function saveAppts() {
  localStorage.setItem('aatco_appts', JSON.stringify(appointments));
}

// ── Render list ───────────────────────────────────────────────
function renderAll() {
  const repFilter = document.getElementById('filter-rep').value;
  const statusFilter = document.getElementById('filter-status').value;
  const today = new Date(); today.setHours(0,0,0,0);

  let filtered = appointments.filter(a => {
    if (repFilter && a.rep !== repFilter) return false;
    if (session.role === 'مندوب' && a.rep !== session.user) return false;
    const aDate = new Date(a.date); aDate.setHours(0,0,0,0);
    if (statusFilter === 'upcoming') return a.status === 'upcoming' && aDate >= today;
    if (statusFilter === 'today')    return aDate.getTime() === today.getTime();
    if (statusFilter === 'overdue')  return a.status === 'upcoming' && aDate < today;
    if (statusFilter === 'done')     return a.status === 'done';
    return true;
  });

  // Sort by date
  filtered.sort((a,b) => new Date(a.date) - new Date(b.date));

  const list = document.getElementById('appt-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">📭 لا توجد مواعيد</div>';
    return;
  }

  list.innerHTML = filtered.map(a => {
    const d = new Date(a.date);
    const aDate = new Date(a.date); aDate.setHours(0,0,0,0);
    const isToday = aDate.getTime() === today.getTime();
    const isOverdue = a.status === 'upcoming' && aDate < today;
    const card = getCards().find(c => c.id == a.cardId);
    const pClass = card ? `pb-${card.priority}` : '';
    const pLabel = card ? card.priority.toUpperCase() : '';

    return `
    <div class="appt-card" style="${isOverdue?'border-color:#dc2626;background:#fff8f8':isToday?'border-color:#1a4a8a;background:#f0f5ff':''}">
      <div class="appt-date-box" style="${isOverdue?'background:#fef2f2':isToday?'background:var(--primary-light)':''}">
        <div class="appt-day" style="${isOverdue?'color:#dc2626':''}">${d.getDate()}</div>
        <div class="appt-month">${d.toLocaleDateString('ar-SA',{month:'short'})}</div>
      </div>
      <div class="appt-info">
        <div class="appt-name">
          ${a.clientName||'—'}
          ${isToday?'<span class="today-badge">اليوم</span>':''}
          ${isOverdue?'<span class="overdue-badge">متأخر</span>':''}
          ${pLabel?`<span class="pb ${pClass}">${pLabel}</span>`:''}
        </div>
        <div class="appt-meta">
          <span>🕐 ${a.time||'—'}</span>
          <span>📋 ${a.type||'—'}</span>
          <span>👤 ${a.rep||'—'}</span>
          ${card?`<span>🔧 ${card.service}</span>`:''}
        </div>
        ${a.notes?`<div style="margin-top:6px;font-size:12px;color:var(--text-muted)">${a.notes}</div>`:''}
      </div>
      <div class="appt-actions">
        ${a.status==='upcoming'?`<button class="btn-sm" onclick="markDone(${a.id})">✅ منتهي</button>`:'<span style="font-size:11px;color:var(--won)">✅ منتهي</span>'}
        <button class="btn-sm" onclick="editAppt(${a.id})">✏️</button>
        <button class="btn-sm danger" onclick="deleteAppt(${a.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');

  renderCalendar();
}

// ── Calendar ──────────────────────────────────────────────────
function renderCalendar() {
  const y = calDate.getFullYear();
  const m = calDate.getMonth();
  document.getElementById('cal-month').textContent =
    new Date(y, m, 1).toLocaleDateString('ar-SA', {month:'long', year:'numeric'});

  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < first; i++) html += '<div class="cal-cell other-month"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(y, m, d);
    const dateStr = date.toISOString().split('T')[0];
    const isToday = date.getTime() === today.getTime();
    const dayAppts = appointments.filter(a => a.date === dateStr &&
      (session.role !== 'مندوب' || a.rep === session.user));

    html += `<div class="cal-cell${isToday?' today':''}${dayAppts.length?' has-appt':''}" onclick="openAddModalDate('${dateStr}')">
      <div class="cal-date">${d}</div>
      ${dayAppts.slice(0,2).map(a => `<div class="appt-dot appt-${getCardPriority(a.cardId)}" title="${a.clientName}">${a.time?a.time+' ':''} ${a.clientName||'موعد'}</div>`).join('')}
      ${dayAppts.length > 2 ? `<div style="font-size:9px;color:var(--text-muted)">+${dayAppts.length-2} أخرى</div>` : ''}
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function getCardPriority(cardId) {
  const card = getCards().find(c => c.id == cardId);
  return card ? card.priority : 'p4';
}

function prevMonth() { calDate.setMonth(calDate.getMonth() - 1); renderCalendar(); }
function nextMonth() { calDate.setMonth(calDate.getMonth() + 1); renderCalendar(); }
function goToday() { calDate = new Date(); renderCalendar(); }

// ── Modal ─────────────────────────────────────────────────────
function openAddModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'إضافة موعد جديد';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-card').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-time').value = '09:00';
  document.getElementById('f-type').value = 'زيارة ميدانية';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-status').value = 'upcoming';
  if (session.role === 'مندوب') document.getElementById('f-rep').value = session.user;
  populateCardSelect();
  document.getElementById('modal').classList.add('show');
}

function openAddModalDate(dateStr) {
  openAddModal();
  document.getElementById('f-date').value = dateStr;
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function editAppt(id) {
  const a = appointments.find(x => x.id === id);
  if (!a) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'تعديل الموعد';
  document.getElementById('edit-id').value = id;
  populateCardSelect();
  document.getElementById('f-card').value = a.cardId || '';
  document.getElementById('f-date').value = a.date;
  document.getElementById('f-time').value = a.time || '09:00';
  document.getElementById('f-type').value = a.type;
  document.getElementById('f-rep').value = a.rep;
  document.getElementById('f-notes').value = a.notes || '';
  document.getElementById('f-status').value = a.status || 'upcoming';
  document.getElementById('modal').classList.add('show');
}

function saveAppt() {
  const cardId = document.getElementById('f-card').value;
  const date = document.getElementById('f-date').value;
  if (!date) { showToast('يرجى اختيار تاريخ الموعد'); return; }

  const cards = getCards();
  const card = cards.find(c => c.id == cardId);
  const clientName = card ? card.name : '—';

  const appt = {
    id: editId || Date.now(),
    cardId, clientName,
    date,
    time: document.getElementById('f-time').value,
    type: document.getElementById('f-type').value,
    rep: document.getElementById('f-rep').value,
    notes: document.getElementById('f-notes').value.trim(),
    status: document.getElementById('f-status').value,
    createdAt: editId ? (appointments.find(a=>a.id===editId)||{}).createdAt : new Date().toISOString()
  };

  if (editId) {
    const i = appointments.findIndex(a => a.id === editId);
    appointments[i] = appt;
  } else {
    appointments.push(appt);
    addActivity(cardId, clientName, `تمت جدولة موعد: ${appt.type}`, session.user, `${date} ${appt.time}`);
  }

  saveAppts();
  syncAppointment(appt, editId ? 'update' : 'add');
  closeModal();
  renderAll();
  showToast(editId ? 'تم تعديل الموعد' : 'تمت إضافة الموعد');
  editId = null;
}

function markDone(id) {
  const a = appointments.find(x => x.id === id);
  if (!a) return;
  a.status = 'done';
  saveAppts();
  syncAppointment(a, 'update');
  addActivity(a.cardId, a.clientName, `تم إنجاز الموعد: ${a.type}`, session.user, '');
  renderAll();
  showToast('تم تحديد الموعد كمنتهي ✅');
}

function deleteAppt(id) {
  if (!confirm('هل أنت متأكد من حذف هذا الموعد؟')) return;
  const deleted = appointments.find(a => a.id === id);
  appointments = appointments.filter(a => a.id !== id);
  saveAppts();
  if (deleted) syncAppointment(deleted, 'delete');
  renderAll();
  showToast('تم حذف الموعد');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
